<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesso Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1a;--card:#111827;--card2:#1a2234;--b:#1e2d45;
  --a:#3b82f6;--al:rgba(59,130,246,.12);
  --g:#10b981;--gl:rgba(16,185,129,.12);
  --r:#ef4444;--rl:rgba(239,68,68,.12);
  --o:#f59e0b;--ol:rgba(245,158,11,.12);
  --t:#f1f5f9;--t2:#94a3b8;--t3:#475569;
  --rs:10px;--rd:14px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:40px;width:100%;max-width:380px;text-align:center}
.login-logo{font-family:'Fraunces',serif;font-size:36px;font-weight:900;color:var(--a);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--t3);margin-bottom:32px}
.inp{width:100%;background:var(--card2);border:1.5px solid var(--b);border-radius:10px;padding:12px 14px;color:var(--t);font-family:inherit;font-size:14px;outline:none;margin-bottom:12px}
.inp:focus{border-color:var(--a)}
.err-msg{color:var(--r);font-size:13px;margin-bottom:12px;display:none}
.app{display:none;min-height:100vh}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--card);border-right:1px solid var(--b);padding:20px 0;z-index:10;overflow-y:auto}
.sidebar-logo{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--a);padding:0 20px 20px;border-bottom:1px solid var(--b);margin-bottom:12px}
.sidebar-logo span{font-size:11px;color:var(--t3);font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;display:block;margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;color:var(--t2);font-size:14px;font-weight:600;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--al);color:var(--t)}
.nav-item.active{background:var(--al);color:var(--a);border-right:3px solid var(--a)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.main{margin-left:220px;padding:28px;min-height:100vh}
.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:900;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--t3);margin-bottom:24px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--b);border-radius:var(--rd);padding:20px}
.stat-val{font-family:'Fraunces',serif;font-size:32px;font-weight:900;line-height:1}
.stat-lbl{font-size:11px;color:var(--t3);font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:.5px}
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--rd);padding:20px;margin-bottom:16px}
.card-title{font-size:14px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--b);white-space:nowrap}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--b);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.02)}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.bg{background:var(--gl);color:var(--g)}
.br{background:var(--rl);color:var(--r)}
.bo{background:var(--ol);color:var(--o)}
.bb{background:var(--al);color:var(--a)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--a);color:#fff}.btn-p:hover{background:#2563eb}
.btn-g{background:var(--g);color:#fff}.btn-g:hover{background:#059669}
.btn-r{background:var(--rl);color:var(--r);border:1px solid rgba(239,68,68,.3)}
.btn-s{background:var(--card2);color:var(--t2);border:1px solid var(--b)}.btn-s:hover{border-color:var(--a);color:var(--t)}
.btn-o{background:var(--ol);color:var(--o);border:1px solid rgba(245,158,11,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border-radius:10px;padding:4px;width:fit-content;border:1px solid var(--b)}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;color:var(--t3);border:none;background:none;font-family:inherit;transition:all .15s}
.tab.active{background:var(--a);color:#fff}
.stars{color:#f59e0b}
.empty-state{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-state .ei{font-size:40px;margin-bottom:12px}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.search-inp{width:100%;background:var(--card2);border:1.5px solid var(--b);border-radius:10px;padding:10px 12px 10px 38px;color:var(--t);font-family:inherit;font-size:14px;outline:none}
.search-inp:focus{border-color:var(--a)}
.notif-dot{background:var(--r);color:#fff;border-radius:20px;font-size:10px;font-weight:800;padding:1px 6px;margin-left:auto}
.spin{width:24px;height:24px;border:3px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--b);border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:800;margin-bottom:16px}
.fg{margin-bottom:14px}
.fl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.fi{width:100%;background:var(--card2);border:1.5px solid var(--b);border-radius:8px;padding:10px 12px;color:var(--t);font-family:inherit;font-size:14px;outline:none}
.fi:focus{border-color:var(--a)}
.brow{display:flex;gap:10px;margin-top:20px}
.brow .btn{flex:1}
.pay-bar{height:8px;background:var(--b);border-radius:4px;overflow:hidden;margin:6px 0}
.pay-fill{height:100%;border-radius:4px;transition:width .4s}
@media(max-width:900px){
  .sidebar{width:56px}
  .sidebar-logo,.nav-item .lbl{display:none}
  .nav-item{justify-content:center;padding:14px}
  .main{margin-left:56px;padding:16px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">Lesso</div>
    <div class="login-sub">Панель администратора</div>
    <div class="err-msg" id="login-err">Неверный пароль</div>
    <input class="inp" type="password" id="admin-pw" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-p" style="width:100%;padding:12px" onclick="doLogin()">Войти</button>
  </div>
</div>

<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-logo">Lesso<span>Admin Panel</span></div>
    <button class="nav-item active" id="nav-dashboard" onclick="showPage('dashboard',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12L12 3L21 12M5 10V20H9V15H15V20H19V10"/></svg>
      <span class="lbl">Дашборд</span>
    </button>
    <button class="nav-item" id="nav-payments" onclick="showPage('payments',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><path d="M1 10h22"/></svg>
      <span class="lbl">Оплаты</span>
      <span class="notif-dot" id="pay-dot" style="display:none">0</span>
    </button>
    <button class="nav-item" id="nav-parents" onclick="showPage('parents',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span class="lbl">Родители</span>
    </button>
    <button class="nav-item" id="nav-teachers" onclick="showPage('teachers',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="lbl">Учителя</span>
    </button>
    <button class="nav-item" id="nav-feedback" onclick="showPage('feedback',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="lbl">Отзывы</span>
      <span class="notif-dot" id="fb-dot" style="display:none">0</span>
    </button>
    <button class="nav-item" id="nav-lessons" onclick="showPage('lessons',this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="lbl">Уроки</span>
    </button>
  </div>
  <div class="main" id="main-content">
    <div style="text-align:center;padding:60px"><div class="spin"></div></div>
  </div>
</div>

<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-inner"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SU='https://yiqipulgofoschkccaxr.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpcWlwdWxnb2Zvc2Noa2NjYXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMjExMjksImV4cCI6MjA4OTg5NzEyOX0.Op4iBjGSOBcKh4pkVSd75_l8Fle3Cz15nBh9KF21YhI';
const ADMIN_ID='01b9a57d-63e2-4e19-9fd2-be19dc4311a0';
const ADMIN_PW='lesso_d4n1l_2025';
const sb=supabase.createClient(SU,SK);

// ── SESSION ──
function doLogin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw!==ADMIN_PW){document.getElementById('login-err').style.display='block';return;}
  sessionStorage.setItem('lesso_admin','1');
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  showPage('dashboard',document.getElementById('nav-dashboard'));
  loadNotifDots();
  setInterval(loadNotifDots,30000);
}
// Восстанавливаем сессию при обновлении
if(sessionStorage.getItem('lesso_admin')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  setTimeout(()=>{showPage('dashboard',document.getElementById('nav-dashboard'));loadNotifDots();setInterval(loadNotifDots,30000);},100);
}

// ── NAV ──
let _currentPage='';
function showPage(name,el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el?.classList.add('active');
  _currentPage=name;
  const m=document.getElementById('main-content');
  m.innerHTML=`<div style="text-align:center;padding:60px"><div class="spin"></div></div>`;
  const pages={dashboard:loadDashboard,payments:loadPayments,teachers:loadTeachers,parents:loadParents,feedback:loadFeedback,lessons:loadLessons};
  if(pages[name]) pages[name]();
}

function fd(d){if(!d)return'—';return new Date(d).toLocaleDateString('ru',{day:'numeric',month:'short',year:'numeric'});}
function ft(d){if(!d)return'—';return new Date(d).toLocaleDateString('ru',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── MODAL ──
function openModal(html){document.getElementById('modal-inner').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}

// ── NOTIF DOTS ──
async function loadNotifDots(){
  try{
    const[{data:pays},{data:fbs}]=await Promise.all([
      sb.from('payment_requests').select('id').is('activated_at',null),
      sb.from('feedback').select('id').is('read_at',null)
    ]);
    const pc=(pays||[]).length,fc=(fbs||[]).length;
    const pd=document.getElementById('pay-dot'),fd2=document.getElementById('fb-dot');
    if(pd){pd.style.display=pc>0?'inline':'none';pd.textContent=pc;}
    if(fd2){fd2.style.display=fc>0?'inline':'none';fd2.textContent=fc;}
  }catch(e){}
}

// ── DASHBOARD ──
async function loadDashboard(){
  try{
    const[
      {count:teachers},{count:parents},{count:students},{count:lessons},
      {data:pendingPays},{data:recentFb},{data:recentPays}
    ]=await Promise.all([
      sb.from('profiles').select('*',{count:'exact',head:true}).eq('role','teacher'),
      sb.from('profiles').select('*',{count:'exact',head:true}).eq('role','parent'),
      sb.from('students').select('*',{count:'exact',head:true}),
      sb.from('lessons').select('*',{count:'exact',head:true}),
      sb.from('payment_requests').select('*').is('activated_at',null).order('created_at',{ascending:false}),
      sb.from('feedback').select('*').order('created_at',{ascending:false}).limit(3),
      sb.from('payment_requests').select('*').order('created_at',{ascending:false}).limit(5)
    ]);
    const pc=(pendingPays||[]).length;
    const m=document.getElementById('main-content');
    m.innerHTML=`
      <div class="page-title">Дашборд 📊</div>
      <div class="page-sub">Общая статистика платформы</div>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val" style="color:var(--a)">${teachers||0}</div><div class="stat-lbl">Учителей</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--g)">${parents||0}</div><div class="stat-lbl">Родителей</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--o)">${students||0}</div><div class="stat-lbl">Учеников</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--t)">${lessons||0}</div><div class="stat-lbl">Уроков</div></div>
      </div>
      ${pc>0?`<div class="card" style="border-color:var(--r)">
        <div class="card-title">🔴 Ожидают активации <span class="bdg br">${pc}</span></div>
        ${(pendingPays||[]).map(p=>payRow(p)).join('')}
        <button class="btn btn-p" style="margin-top:12px" onclick="showPage('payments',document.getElementById('nav-payments'))">Все заявки →</button>
      </div>`:'<div class="card" style="border-color:var(--g)"><div style="color:var(--g);font-weight:700">✅ Нет ожидающих заявок на оплату</div></div>'}
      <div class="card">
        <div class="card-title">💬 Последние отзывы</div>
        ${(recentFb||[]).length?(recentFb||[]).map(f=>fbRow(f)).join(''):'<div class="empty-state"><div class="ei">💬</div><p>Отзывов пока нет</p></div>'}
      </div>`;
  }catch(e){document.getElementById('main-content').innerHTML=`<div style="color:var(--r);padding:20px">Ошибка: ${e.message}</div>`;}
}

function payRow(p,done=false){
  return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--b)">
    <div style="flex:1;min-width:0">
      <div style="font-weight:700">${esc(p.name||'—')}</div>
      <div style="font-size:12px;color:var(--t3)">${esc(p.email||'—')} · ${ft(p.created_at)}</div>
      <div style="display:flex;gap:6px;margin-top:4px">
        ${p.amount?`<span class="bdg bg">💰 ${p.amount}₽</span>`:''}
        <span class="bdg bb">👶 ${p.children_count||1} реб.</span>
        ${done?`<span class="bdg bg">✅ ${ft(p.activated_at)}</span>`:''}
      </div>
    </div>
    ${!done?`<button class="btn btn-g" onclick="activateParent('${p.id}','${p.user_id}','${esc(p.name)}')">✓ Активировать</button>`:''}
  </div>`;
}

function fbRow(f){
  return`<div style="padding:10px 0;border-bottom:1px solid var(--b)">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
      <span class="bdg bb">${f.role||'—'}</span>
      ${f.rating?`<span class="stars">${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</span>`:''}
      <span style="font-size:11px;color:var(--t3);margin-left:auto">${ft(f.created_at)}</span>
    </div>
    <div style="font-size:13px;color:var(--t2)">${esc(f.text||'')}</div>
  </div>`;
}

// ── PAYMENTS ──
async function loadPayments(){
  try{
    const{data}=await sb.from('payment_requests').select('*').order('created_at',{ascending:false});
    const pending=(data||[]).filter(p=>!p.activated_at);
    const done=(data||[]).filter(p=>p.activated_at);
    const m=document.getElementById('main-content');
    m.innerHTML=`
      <div class="page-title">Оплаты 💰</div>
      <div class="page-sub">Заявки «Я оплатил» от родителей</div>
      <div class="tabs">
        <button class="tab active" onclick="payTab('pending',this)">Ожидают (${pending.length})</button>
        <button class="tab" onclick="payTab('done',this)">Активированы (${done.length})</button>
      </div>
      <div id="pay-pending">
        ${pending.length?pending.map(p=>payCard(p,false)).join(''):'<div class="empty-state"><div class="ei">🎉</div><p>Нет ожидающих заявок</p></div>'}
      </div>
      <div id="pay-done" style="display:none">
        ${done.length?done.map(p=>payCard(p,true)).join(''):'<div class="empty-state"><div class="ei">📋</div><p>Нет активированных</p></div>'}
      </div>`;
  }catch(e){document.getElementById('main-content').innerHTML=`<div style="color:var(--r);padding:20px">Ошибка: ${e.message}</div>`;}
}

function payTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('pay-pending').style.display=tab==='pending'?'block':'none';
  document.getElementById('pay-done').style.display=tab==='done'?'block':'none';
}

function payCard(p,done){
  return`<div class="card" style="border-color:${done?'var(--b)':'var(--o)'}">
    <div style="display:flex;align-items:flex-start;gap:14px">
      <div style="width:44px;height:44px;background:${done?'var(--gl)':'var(--ol)'};border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${done?'✅':'⏳'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:15px">${esc(p.name||'—')}</div>
        <div style="font-size:13px;color:var(--t2);margin-top:2px">${esc(p.email||'—')}</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
          ${p.amount?`<span class="bdg bg">💰 ${p.amount}₽</span>`:''}
          <span class="bdg bb">👶 ${p.children_count||1} реб.</span>
          <span class="bdg bo">${ft(p.created_at)}</span>
          ${done?`<span class="bdg bg">Активировано: ${ft(p.activated_at)}</span>`:''}
        </div>
      </div>
      ${!done?`<button class="btn btn-g" onclick="activateParent('${p.id}','${p.user_id}','${esc(p.name)}')">✓ Активировать</button>`:''}
    </div>
  </div>`;
}

async function activateParent(reqId,userId,name){
  openModal(`<div class="modal-title">💰 Активация: ${esc(name)}</div>
    <div class="fg"><label class="fl">Сумма пополнения (₽)</label><input class="fi" id="act-amount" type="number" placeholder="300" min="0"></div>
    <div class="fg"><label class="fl">Кол-во детей</label>
      <select class="fi" id="act-children"><option value="1">1 ребёнок — 300₽/мес</option><option value="2">2+ детей — 500₽/мес</option></select>
    </div>
    <div style="background:var(--al);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--t2)" id="act-preview">Введите сумму</div>
    <div class="brow">
      <button class="btn btn-s" onclick="closeModal()">Отмена</button>
      <button class="btn btn-g" id="act-btn" onclick="doActivate('${reqId}','${userId}')">✓ Активировать</button>
    </div>`);
  // Живой расчёт
  const upd=()=>{
    const amt=parseInt(document.getElementById('act-amount')?.value)||0;
    const ch=parseInt(document.getElementById('act-children')?.value)||1;
    const price=ch>=2?500:300;
    const months=amt>0?Math.floor(amt/price):0;
    const rem=amt>0?amt%price:0;
    document.getElementById('act-preview').innerHTML=amt>0
      ?`<strong>Сумма ${amt}₽</strong> → ${months} мес по ${price}₽ + остаток ${rem}₽ на счёте`
      :'Введите сумму';
  };
  setTimeout(()=>{
    document.getElementById('act-amount')?.addEventListener('input',upd);
    document.getElementById('act-children')?.addEventListener('change',upd);
  },100);
}

async function doActivate(reqId,userId){
  const amt=parseInt(document.getElementById('act-amount')?.value)||0;
  if(amt<1){alert('Введите сумму');return;}
  const btn=document.getElementById('act-btn');
  if(btn){btn.disabled=true;btn.textContent='...';}
  // Получаем текущий баланс
  const{data:prof}=await sb.from('profiles').select('balance').eq('id',userId).single();
  const newBalance=(prof?.balance||0)+amt;
  const[{error:e1},{error:e2}]=await Promise.all([
    sb.from('payment_requests').update({activated_at:new Date().toISOString(),activated_by:'admin'}).eq('id',reqId),
    sb.from('profiles').update({balance:newBalance}).eq('id',userId)
  ]);
  if(e1||e2){alert('Ошибка: '+(e1?.message||e2?.message));if(btn){btn.disabled=false;btn.textContent='✓ Активировать';}return;}
  // Уведомление родителю
  await sb.from('notifications').insert({recipient_id:userId,type:'payment_activated',title:'✅ Баланс пополнен!',body:`Пополнение: ${amt}₽. Текущий баланс: ${newBalance}₽`}).catch(()=>{});
  await fetch(`${SU}/functions/v1/send-push`,{method:'POST',headers:{'Authorization':`Bearer ${SK}`,'Content-Type':'application/json'},body:JSON.stringify({user_ids:[userId],title:'✅ Баланс пополнен!',body:`Пополнение ${amt}₽ · Баланс: ${newBalance}₽`})}).catch(()=>{});
  closeModal();
  alert(`✅ Баланс пополнен на ${amt}₽. Новый баланс: ${newBalance}₽`);
  loadPayments();
  loadNotifDots();
}

// ── PARENTS ──
async function loadParents(){
  try{
    const{data}=await sb.from('profiles').select('*').eq('role','parent').order('created_at',{ascending:false});
    const now=new Date();
    const m=document.getElementById('main-content');
    m.innerHTML=`
      <div class="page-title">Родители 👨‍👩‍👦</div>
      <div class="page-sub">Управление родителями и их балансом</div>
      <div class="search-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="search-inp" placeholder="Поиск по имени или email..." oninput="filterTable(this.value,'parents-tbl')">
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="tbl" id="parents-tbl">
          <thead><tr>
            <th>Родитель</th><th>Баланс</th><th>Статус</th><th>Дети</th><th>Триал до</th><th>Регистрация</th><th>Действия</th>
          </tr></thead>
          <tbody>
            ${(data||[]).map(p=>{
              const bal=p.balance||0;
              const isTrial=p.trial_until&&new Date(p.trial_until)>now;
              const price=300; // упрощённо
              const monthsLeft=bal>0?Math.floor(bal/price):0;
              const status=bal>0?'active':isTrial?'trial':'expired';
              return`<tr>
                <td>
                  <div style="font-weight:700">${esc(p.name)}</div>
                  <div style="font-size:12px;color:var(--t3)">${esc(p.email||'—')}</div>
                </td>
                <td>
                  <div style="font-size:16px;font-weight:800;color:${bal>0?'var(--g)':'var(--t3)'}">${bal}₽</div>
                  ${bal>0?`<div style="font-size:11px;color:var(--t3)">~${monthsLeft} мес</div>`:'<div style="font-size:11px;color:var(--t3)">нет баланса</div>'}
                </td>
                <td>${status==='active'?'<span class="bdg bg">✅ Активен</span>':status==='trial'?'<span class="bdg bo">⏳ Триал</span>':'<span class="bdg br">❌ Истёк</span>'}</td>
                <td id="pch-${p.id}" style="font-size:13px;font-weight:700;color:var(--a)">...</td>
                <td style="font-size:12px;color:var(--t3)">${p.trial_until?fd(p.trial_until):'—'}</td>
                <td style="font-size:12px;color:var(--t3)">${fd(p.created_at)}</td>
                <td>
                  <div style="display:flex;gap:6px;flex-wrap:wrap">
                    <button class="btn btn-g" style="padding:5px 10px;font-size:11px" onclick="addBalance('${p.id}','${esc(p.name)}',${bal})">+ Баланс</button>
                    <button class="btn btn-s" style="padding:5px 10px;font-size:11px" onclick="viewParentChildren('${p.id}','${esc(p.name)}')">👶 Дети</button>
                    <button class="btn btn-r" style="padding:5px 10px;font-size:11px" onclick="deleteUser('${p.id}','${esc(p.name)}','parent')">Удалить</button>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  }catch(e){document.getElementById('main-content').innerHTML=`<div style="color:var(--r);padding:20px">Ошибка: ${e.message}</div>`;}
}

  // Загружаем кол-во детей — два запроса из-за ограничений Supabase
  (data||[]).forEach(async p=>{
    const[{data:c1},{data:c2}]=await Promise.all([
      sb.from('students').select('id').eq('parent_user_id',p.id),
      sb.from('students').select('id').eq('parent_user_id2',p.id)
    ]);
    const ids=new Set([...(c1||[]).map(s=>s.id),...(c2||[]).map(s=>s.id)]);
    const count=ids.size;
    const price=count>=2?500:count===1?300:0;
    const el=document.getElementById('pch-'+p.id);
    if(el) el.innerHTML=count>0
      ?'<span class="bdg bb">👶 '+count+'</span><div style="font-size:11px;color:var(--t3);margin-top:2px">'+price+'₽/мес</div>'
      :'<span style="color:var(--t3)">—</span>';
  });

async function addBalance(userId,name,currentBal){
  openModal(`<div class="modal-title">💰 Пополнение баланса: ${esc(name)}</div>
    <div style="background:var(--al);border-radius:8px;padding:12px;margin-bottom:16px">
      <div style="font-size:13px;color:var(--t2)">Текущий баланс: <strong style="color:var(--a)">${currentBal}₽</strong></div>
    </div>
    <div class="fg"><label class="fl">Сумма пополнения (₽)</label><input class="fi" id="bal-amount" type="number" placeholder="300" min="1" oninput="updBalPreview(${currentBal})"></div>
    <div style="background:var(--gl);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px" id="bal-preview">Введите сумму</div>
    <div class="brow">
      <button class="btn btn-s" onclick="closeModal()">Отмена</button>
      <button class="btn btn-g" id="bal-btn" onclick="doAddBalance('${userId}',${currentBal})">Пополнить</button>
    </div>`);
}

function updBalPreview(current){
  const amt=parseInt(document.getElementById('bal-amount')?.value)||0;
  const newBal=current+amt;
  document.getElementById('bal-preview').innerHTML=amt>0
    ?`Новый баланс: <strong style="color:var(--g)">${newBal}₽</strong> (~${Math.floor(newBal/300)} мес для 1 реб.)`
    :'Введите сумму';
}

async function doAddBalance(userId,currentBal){
  const amt=parseInt(document.getElementById('bal-amount')?.value)||0;
  if(amt<1){alert('Введите сумму');return;}
  const btn=document.getElementById('bal-btn');
  if(btn){btn.disabled=true;btn.textContent='...';}
  const newBal=currentBal+amt;
  const{error}=await sb.from('profiles').update({balance:newBal}).eq('id',userId);
  if(error){alert('Ошибка: '+error.message);if(btn){btn.disabled=false;btn.textContent='Пополнить';}return;}
  await sb.from('notifications').insert({recipient_id:userId,type:'payment_activated',title:'✅ Баланс пополнен!',body:`Пополнение: ${amt}₽. Баланс: ${newBal}₽`}).catch(()=>{});
  await fetch(`${SU}/functions/v1/send-push`,{method:'POST',headers:{'Authorization':`Bearer ${SK}`,'Content-Type':'application/json'},body:JSON.stringify({user_ids:[userId],title:'✅ Баланс пополнен!',body:`+${amt}₽ · Баланс: ${newBal}₽`})}).catch(()=>{});
  closeModal();
  alert(`✅ Баланс пополнен. Новый баланс: ${newBal}₽`);
  loadParents();
}

async function viewParentChildren(parentId,parentName){
  const[{data:s1},{data:s2}]=await Promise.all([
    sb.from('students').select('*').eq('parent_user_id',parentId),
    sb.from('students').select('*').eq('parent_user_id2',parentId)
  ]);
  const seenIds=new Set(); const stus=[];
  for(const s of [...(s1||[]),...(s2||[])]){ if(!seenIds.has(s.id)){seenIds.add(s.id);stus.push(s);} }
  const tIds=[...new Set((stus||[]).map(s=>s.teacher_id).filter(Boolean))];
  const{data:teachers}=tIds.length?await sb.from('profiles').select('id,name,teacher_code').in('id',tIds):{data:[]};
  const tMap=Object.fromEntries((teachers||[]).map(t=>[t.id,t]));
  openModal(`<div class="modal-title">👶 Дети: ${esc(parentName)}</div>
    ${(stus||[]).length?(stus||[]).map(s=>{
      const t=tMap[s.teacher_id]||{};
      return`<div style="background:var(--card2);border-radius:var(--rs);padding:14px;margin-bottom:10px">
        <div style="font-weight:800;font-size:15px;margin-bottom:8px">${esc(s.name)}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px">
          <div><span style="color:var(--t3)">Предмет:</span> ${esc(s.subject||'—')}</div>
          <div><span style="color:var(--t3)">PIN:</span> <code style="background:var(--bg);padding:2px 6px;border-radius:4px">${esc(s.pin)}</code></div>
          <div><span style="color:var(--t3)">Учитель:</span> ${esc(t.name||'—')}</div>
          <div><span style="color:var(--t3)">Код учителя:</span> <code style="background:var(--bg);padding:2px 6px;border-radius:4px">${esc(t.teacher_code||'—')}</code></div>
          ${s.active===false?'<div style="color:var(--r);font-weight:700">❌ Заблокирован</div>':''}
        </div>
      </div>`;
    }).join(''):'<div class="empty-state"><div class="ei">👶</div><p>Нет привязанных детей</p></div>'}
    <button class="btn btn-s" style="width:100%;margin-top:8px" onclick="closeModal()">Закрыть</button>`);
}

      <div class="page-title">Учителя 👨‍🏫</div>

      <div class="search-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>

          <tbody>
            ${(data||[]).map(t=>`<tr>
              <td><div style="font-weight:700">${esc(t.name)}</div><div style="font-size:12px;color:var(--t3)">${esc(t.email||'—')}</div></td>
              <td><span class="bdg bb">${esc(t.teacher_code||'—')}</span></td>
              <td id="tc-${t.id}"><div class="spin" style="width:14px;height:14px;border-width:2px"></div></td>
              <td style="font-size:12px;color:var(--t3)">${fd(t.created_at)}</td>
              <td>
                <div style="display:flex;gap:6px">

async function viewTeacherStudents(teacherId,teacherName){
  const{data:stus}=await sb.from('students').select('*').eq('teacher_id',teacherId).order('name');

    ${(stus||[]).length?(stus||[]).map(s=>`<div style="background:var(--card2);border-radius:var(--rs);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px">

}

// ── LESSONS ──

              <td>${l.status==='done'?'<span class="bdg bg">✓ Готов</span>':l.status==='cancelled'?'<span class="bdg br">Отменён</span>':'<span class="bdg bo">Запланирован</span>'}</td>
              <td>${l.grade?`<span style="font-weight:800;color:${l.grade>=4?'var(--g)':l.grade===3?'var(--o)':'var(--r)'}">${l.grade}</span>`:'—'}</td>
              <td>${l.homework?`${l.hw_done?'<span class="bdg bg">✅</span>':'<span class="bdg br">⏳</span>'}`:'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }catch(e){document.getElementById('main-content').innerHTML=`<div style="color:var(--r);padding:20px">Ошибка: ${e.message}</div>`;}

// ── DELETE ──
async function deleteUser(id,name,role){
  if(!confirm(`Удалить ${role==='teacher'?'учителя':'родителя'} "${name}"?\nЭто действие необратимо.`)) return;
  const{error}=await sb.from('profiles').delete().eq('id',id);
  if(error){alert('Ошибка: '+error.message);return;}
  alert(`✅ ${name} удалён`);
  if(role==='teacher') loadTeachers(); else loadParents();
}

// ── SEARCH ──
function filterTable(query,tblId){
  const rows=document.querySelectorAll(`#${tblId} tbody tr`);
  const q=query.toLowerCase();
  rows.forEach(row=>{row.style.display=row.textContent.toLowerCase().includes(q)?'':'none';});
}
</script>
