<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Lesso">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <title>Lesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#f8f9fc;--white:#fff;--border:#e8eaf0;--text:#0f1520;--text2:#5a6478;--text3:#9aa0b0;--accent:#2563eb;--al:#eff4ff;--ad:#1d4ed8;--green:#16a34a;--gl:#f0fdf4;--orange:#ea580c;--ol:#fff7ed;--red:#dc2626;--rl:#fef2f2;--r:16px;--rs:10px;--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--shl:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04)}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);overflow-x:hidden}
    /* Layout */
    .page{padding:20px 16px 100px;max-width:480px;margin:0 auto;animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .app-header{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between}
    .app-logo{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:var(--accent)}
    .app-user{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2)}
    .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;background:var(--accent);flex-shrink:0}
    .logout-btn{background:none;border:none;cursor:pointer;color:var(--text3);padding:6px;border-radius:8px}
    .app-content{padding-top:56px;min-height:100dvh}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;border:none;background:none;cursor:pointer;color:var(--text3);font-family:'Plus Jakarta Sans',sans-serif;font-size:10px;font-weight:700;transition:color .15s}
    .nav-item.active{color:var(--accent)}
    .nav-item svg{width:22px;height:22px}
    .fab{position:fixed;right:20px;bottom:74px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(37,99,235,.35);transition:transform .15s;z-index:99}
    .fab:active{transform:scale(.93)}
    .fab svg{width:22px;height:22px;color:#fff}
    /* Auth */
    .auth-page{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .logo{font-family:'Fraunces',serif;font-size:48px;font-weight:900;color:var(--accent);letter-spacing:-1px;margin-bottom:4px}
    .logo-sub{font-size:14px;color:var(--text3);margin-bottom:40px;font-weight:500}
    .role-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:360px}
    .role-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .18s;box-shadow:var(--sh);text-align:left}
    .role-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shl)}
    .role-card:active{transform:scale(.98)}
    .role-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .role-name{font-weight:700;font-size:15px;margin-bottom:2px}
    .role-desc{font-size:12px;color:var(--text2)}
    /* Form panel */
    .form-panel{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:24px;width:100%;max-width:360px;box-shadow:var(--shl);margin-top:16px}
    .panel-back{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;background:none;border:none;padding:0;margin-bottom:20px}
    .panel-back:hover{color:var(--accent)}
    .panel-title{font-family:'Fraunces',serif;font-size:24px;font-weight:900;margin-bottom:6px}
    .panel-sub{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.5}
    /* Inputs */
    .form-group{margin-bottom:14px}
    .form-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px;display:block}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--rs);padding:12px 14px;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:500;outline:none;transition:border-color .15s;-webkit-appearance:none}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);background:var(--white)}
    .form-input::placeholder{color:var(--text3);font-weight:400}
    .form-textarea{resize:none;min-height:80px}
    /* PIN */
    .pin-wrap{display:flex;gap:10px;justify-content:center;margin:8px 0 24px}
    .pin-digit{width:60px;height:68px;border:1.5px solid var(--border);border-radius:var(--rs);background:var(--white);font-size:26px;font-weight:800;text-align:center;color:var(--accent);outline:none;font-family:'Plus Jakarta Sans',sans-serif;transition:border-color .15s;-webkit-appearance:none}
    .pin-digit:focus{border-color:var(--accent)}
    /* Buttons */
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;border-radius:var(--rs);border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;transition:all .15s}
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
    .btn-primary:hover:not(:disabled){background:var(--ad)}
    .btn-secondary{background:var(--white);color:var(--text);border:1.5px solid var(--border)}
    .btn-danger{background:var(--rl);color:var(--red);border:1px solid #fecaca}
    .btn-green{background:var(--gl);color:var(--green);border:1.5px solid #bbf7d0}
    .btn-sm{padding:8px 14px;font-size:13px;width:auto}
    .btn-row{display:flex;gap:10px;margin-top:8px}
    /* Error */
    .error-msg{background:var(--rl);border:1px solid #fecaca;color:var(--red);padding:12px 14px;border-radius:var(--rs);font-size:13px;font-weight:600;margin-bottom:14px;display:none}
    .error-msg.show{display:block}
    /* Cards */
    .card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
    .card-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);margin-bottom:10px}
    .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .stat-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
    .stat-val{font-family:'Fraunces',serif;font-size:32px;font-weight:900;line-height:1}
    .stat-lbl{font-size:12px;color:var(--text2);font-weight:600;margin-top:4px}
    .stat-box.blue .stat-val{color:var(--accent)}
    .stat-box.green .stat-val{color:var(--green)}
    .stat-box.orange .stat-val{color:var(--orange)}
    /* Section */
    .sec-title{font-family:'Fraunces',serif;font-size:22px;font-weight:900;margin-bottom:4px}
    .sec-sub{font-size:13px;color:var(--text2);margin-bottom:18px}
    .sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
    .badge-blue{background:var(--al);color:var(--accent)}
    .badge-green{background:var(--gl);color:var(--green)}
    .badge-orange{background:var(--ol);color:var(--orange)}
    .badge-gray{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
    .badge-red{background:var(--rl);color:var(--red)}
    /* Lesson card */
    .lcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
    .lcard:hover{border-color:var(--accent);box-shadow:var(--shl)}
    .lcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
    .lcard-title{font-weight:700;font-size:15px}
    .lcard-meta{font-size:12px;color:var(--text2);margin-top:2px}
    .lcard-footer{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
    .grade{font-family:'Fraunces',serif;font-weight:900;font-size:18px;padding:2px 10px;border-radius:10px}
    .grade-5{background:var(--gl);color:var(--green)}
    .grade-4{background:var(--al);color:var(--accent)}
    .grade-3{background:var(--ol);color:var(--orange)}
    .grade-2{background:var(--rl);color:var(--red)}
    /* Word */
    .witem{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh);cursor:pointer;transition:border-color .15s}
    .witem:hover{border-color:var(--accent)}
    .ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .lv0{background:#cbd5e1}.lv1{background:#f87171}.lv2{background:#fb923c}.lv3{background:#4ade80}
    .wen{font-weight:700;font-size:15px}
    .wru{font-size:13px;color:var(--text2)}
    .wchip{margin-left:auto;font-size:11px;color:var(--text3);background:var(--bg);padding:3px 8px;border-radius:8px;flex-shrink:0}
    /* Flashcard */
    .fc-wrap{perspective:1000px;margin:16px 0}
    .fc{position:relative;width:100%;height:200px;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.4,0,.2,1);cursor:pointer}
    .fc.flipped{transform:rotateY(180deg)}
    .fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;border:1.5px solid var(--border);box-shadow:var(--shl)}
    .fc-front{background:var(--white)}
    .fc-back{background:var(--al);border-color:#bfdbfe;transform:rotateY(180deg)}
    .fc-word{font-family:'Fraunces',serif;font-size:34px;font-weight:900;text-align:center;padding:0 20px}
    .fc-hint{font-size:13px;color:var(--text3);font-weight:600}
    .fc-chip{font-size:12px;color:var(--accent);background:var(--al);padding:4px 12px;border-radius:20px;font-weight:700}
    /* Progress bar */
    .pbar-wrap{background:var(--bg);border-radius:20px;height:8px;overflow:hidden;margin-top:4px}
    .pbar{height:100%;border-radius:20px;background:var(--accent);transition:width .6s}
    /* Chat */
    .chat-list{display:flex;flex-direction:column;gap:10px;padding:10px 0}
    .msg{max-width:82%}
    .msg.mine{align-self:flex-end}
    .msg.theirs{align-self:flex-start}
    .msg-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;font-weight:500}
    .msg.mine .msg-bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
    .msg.theirs .msg-bubble{background:var(--white);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--sh)}
    .msg-who{font-size:11px;color:var(--text3);margin-bottom:3px;font-weight:600}
    .msg-time{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
    .msg.mine .msg-time{text-align:right}
    .chat-bottom{position:sticky;bottom:0;background:var(--bg);padding:10px 0 calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px}
    .chat-input{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:24px;padding:11px 16px;font-size:14px;font-weight:500;font-family:'Plus Jakarta Sans',sans-serif;outline:none;color:var(--text)}
    .chat-input:focus{border-color:var(--accent)}
    .chat-send{width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .chat-send svg{width:18px;height:18px;color:#fff}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,21,32,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px)}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--white);border-radius:24px 24px 0 0;padding:20px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:480px;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
    .modal-overlay.open .modal{transform:none}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
    .modal-title{font-family:'Fraunces',serif;font-size:22px;font-weight:900;margin-bottom:18px}
    /* Pay toggle */
    .pay-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);margin-top:10px}
    .pay-lbl{font-size:13px;color:var(--text2);font-weight:600}
    .toggle{width:44px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
    .toggle.on{background:var(--green)}
    .toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .toggle.on::after{transform:translateX(20px)}
    /* Level selector */
    .level-row{display:flex;gap:8px}
    .lopt{flex:1;padding:10px 6px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
    .lopt.active{border-color:var(--accent);background:var(--al);color:var(--accent)}
    /* Filter */
    .frow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
    .fchip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s}
    .fchip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    /* Student card */
    .scard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s}
    .scard:hover{border-color:var(--accent)}
    .savatar{width:44px;height:44px;border-radius:50%;background:var(--al);color:var(--accent);font-family:'Fraunces',serif;font-size:20px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sname{font-weight:700;font-size:15px}
    .smeta{font-size:12px;color:var(--text2);margin-top:2px}
    .spin-badge{margin-left:auto;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;color:var(--text2);font-family:'Fraunces',serif}
    /* Empty / Loading */
    .empty{text-align:center;padding:48px 20px;color:var(--text2)}
    .empty-icon{font-size:44px;margin-bottom:12px}
    .empty p{font-size:14px;line-height:1.6}
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;gap:16px}
    .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Toast */
    #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;border-radius:20px;padding:10px 20px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;z-index:999}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    /* Material item */
    .mitem{display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;box-shadow:var(--sh)}
    .micon{width:38px;height:38px;border-radius:10px;background:var(--rl);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
    .mname{font-weight:600;font-size:14px}
    .msize{font-size:12px;color:var(--text2)}
    /* Teacher selector on login */
    .teacher-item{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;box-shadow:var(--sh);margin-bottom:10px}
    .teacher-item:hover{border-color:var(--accent)}
    .teacher-item:active{transform:scale(.98)}
  </style>
</head>
<body>

<!-- ══ PAGES ══ -->
<div id="pg-loading" class="loading"><div class="spinner"></div><div style="font-size:14px;color:var(--text2);font-weight:600">Загрузка...</div></div>
<div id="pg-roles" style="display:none"></div>
<div id="pg-auth" style="display:none"></div>
<div id="pg-teachers" style="display:none"></div>
<div id="pg-pin" style="display:none"></div>
<div id="pg-app" style="display:none;flex-direction:column;height:100dvh"></div>

<div id="toast"></div>

<!-- ══ MODALS ══ -->
<div class="modal-overlay" id="m-lesson">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-lesson-title">Урок</div>
    <div class="form-group"><label class="form-label">Тема урока</label><input class="form-input" id="li-title" placeholder="Past Simple, числа 1-20..."></div>
    <div class="form-group"><label class="form-label">Дата</label><input class="form-input" type="date" id="li-date"></div>
    <div class="form-group"><label class="form-label">Ссылка Zoom</label><input class="form-input" type="url" id="li-zoom" placeholder="https://zoom.us/j/..."></div>
    <div class="form-group"><label class="form-label">Домашнее задание</label><textarea class="form-textarea" id="li-hw" placeholder="Выучить слова, написать предложения..."></textarea></div>
    <div class="form-group"><label class="form-label">Оценка</label>
      <select class="form-select" id="li-grade">
        <option value="">— не ставить —</option>
        <option value="5">5 — Отлично</option><option value="4">4 — Хорошо</option>
        <option value="3">3 — Удовлетворительно</option><option value="2">2 — Плохо</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Заметки</label><textarea class="form-textarea" id="li-notes" placeholder="Что далось сложно..."></textarea></div>
    <div class="pay-row"><div class="pay-lbl">Урок оплачен</div><button class="toggle" id="li-paid" onclick="togglePaid(this)"></button></div>
    <button class="btn btn-secondary" id="li-status-btn" style="margin-top:12px" onclick="toggleStatus(this)">▶ Начать урок</button>
    <div class="btn-row" style="margin-top:10px">
      <button class="btn btn-secondary" onclick="closeModal('m-lesson')">Отмена</button>
      <button class="btn btn-primary" onclick="saveLesson()">Сохранить</button>
    </div>
    <button class="btn btn-danger" id="li-delete-btn" style="display:none;margin-top:8px" onclick="deleteLesson()">Удалить урок</button>
  </div>
</div>

<div class="modal-overlay" id="m-word">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Новое слово</div>
    <div class="form-group"><label class="form-label">Английское слово</label><input class="form-input" id="wi-en" placeholder="apple"></div>
    <div class="form-group"><label class="form-label">Перевод</label><input class="form-input" id="wi-ru" placeholder="яблоко"></div>
    <div class="form-group"><label class="form-label">Тема</label><input class="form-input" id="wi-topic" placeholder="Еда, Животные..."></div>
    <div class="form-group"><label class="form-label">Уровень знания</label>
      <div class="level-row">
        <button class="lopt active" data-lv="0" onclick="selLv(this)">Новое</button>
        <button class="lopt" data-lv="1" onclick="selLv(this)">Учит</button>
        <button class="lopt" data-lv="2" onclick="selLv(this)">Почти</button>

        </div>
      </div>

}

function toggleAuthMode() {
  authMode = authMode === 'login' ? 'register' : 'login';
  document.getElementById('auth-btn').textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
  document.querySelector('[onclick="toggleAuthMode()"]').textContent = authMode === 'login' ? 'Зарегистрироваться' : 'Уже есть аккаунт';
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  const errEl = document.getElementById('auth-err');
  errEl.classList.remove('show');
  if (!email || !pass) { errEl.textContent = 'Заполните все поля'; errEl.classList.add('show'); return; }
  document.getElementById('auth-btn').textContent = '...';
  showPg('pg-loading');

  let result, uid;
  if (authMode === 'register') {
    result = await sb.auth.signUp({ email, password: pass });
    if (result.error) { showPg('pg-auth'); errEl.textContent = result.error.message; errEl.classList.add('show'); document.getElementById('auth-btn').textContent = 'Зарегистрироваться'; return; }
    uid = result.data.user.id;
    // Генерируем уникальный teacher_code если учитель
    const code = authRole === 'teacher' ? Math.random().toString(36).substring(2,6).toUpperCase() : null;
    await sb.from('profiles').upsert({ id: uid, role: authRole, name: email.split('@')[0], teacher_code: code });
  } else {
    result = await sb.auth.signInWithPassword({ email, password: pass });
    if (result.error) { showPg('pg-auth'); errEl.textContent = result.error.message === 'Invalid login credentials' ? 'Неверный email или пароль' : result.error.message; errEl.classList.add('show'); document.getElementById('auth-btn').textContent = 'Войти'; return; }
    uid = result.data.user.id;
  }

  const { data: profile } = await sb.from('profiles').select('*').eq('id', uid).single();
  me = { role: profile.role, name: profile.name, id: uid, teacher_code: profile.teacher_code };
  launchApp();
}

function pinInput(el, idx) {
  el.value = el.value.toString().slice(-1);
  if (el.value && idx < 3) document.getElementById('p' + (idx+1)).focus();
  if (idx === 3 && el.value) doPin();
}

async function doPin() {
  const pin = [0,1,2,3].map(i => document.getElementById('p'+i)?.value||'').join('');
  if (pin.length < 4) { showPinErr('Введи все 4 цифры'); return; }

  showPg('pg-loading');
  // Ищем ученика по teacher_id + pin
  const { data: student } = await sb.from('students')
    .select('*').eq('teacher_id', selectedTeacherId).eq('pin', pin).single();

  if (!student) {
    showPin(selectedTeacherId, '');
    showPinErr('Неверный PIN-код');
    return;
  }

  // Анонимный вход в Supabase чтобы RLS работал
  const { data: anonData } = await sb.auth.signInAnonymously();
  me = { role: 'student', name: student.name, id: anonData?.user?.id || null, student_id: student.id, teacher_id: selectedTeacherId };
  launchApp();
}

let allWords = [];
async function tWords(el) {
  el.innerHTML = `<div class="page"><div class="sec-title">Словарь</div><div class="sec-sub">Слова учеников</div><div class="frow"><button class="fchip active" data-f="all" onclick="filterWords(this)">Все</button><button class="fchip" data-f="0" onclick="filterWords(this)">Новые</button><button class="fchip" data-f="1" onclick="filterWords(this)">Учат</button><button class="fchip" data-f="2" onclick="filterWords(this)">Почти</button><button class="fchip" data-f="3" onclick="filterWords(this)">Знают ✓</button></div><div id="t-words">Загрузка...</div><div style="height:80px"></div></div>`;

}

function filterWords(btn) {
  document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));

  renderWordList(btn.dataset.f);
}

function renderWordList(f) {
  const list = document.getElementById('t-words');
  if (!list) return;
  const filtered = f==='all' ? allWords : allWords.filter(w=>w.level==f);
  if (!filtered.length) { list.innerHTML='<div class="empty"><div class="empty-icon">📖</div><p>Нет слов</p></div>'; return; }
  list.innerHTML = filtered.map(w=>`
    <div class="witem">
      <div class="ldot lv${w.level}"></div>
      <div><div class="wen">${w.word}</div><div class="wru">${w.translation}</div></div>
      <div class="wchip">${w.topic||'—'}</div>
    </div>`).join('');
}

async function tProgress(el) {
  const [{ data: words },{ data: lessons }] = await Promise.all([
    sb.from('words').select('level,topic'),
    sb.from('lessons').select('grade,paid').eq('teacher_id',me.id)
  ]);
  const lvls=[0,0,0,0]; const tmap={};
  (words||[]).forEach(w=>{
    lvls[w.level]++;
    if (!tmap[w.topic]) tmap[w.topic]={t:0,k:0};
    tmap[w.topic].t++; if(w.level===3) tmap[w.topic].k++;
  });
  const tot=words?.length||1;
  const grades=(lessons||[]).filter(l=>l.grade).map(l=>l.grade);
  const avg=grades.length?(grades.reduce((a,b)=>a+b,0)/grades.length).toFixed(1):'—';
  const unpaid=(lessons||[]).filter(l=>!l.paid).length;

  el.innerHTML=`<div class="page"><div class="sec-title">Прогресс</div><div class="sec-sub">Общая статистика</div>
    <div class="stat-row">
      <div class="stat-box blue"><div class="stat-val">${words?.length||0}</div><div class="stat-lbl">Всего слов</div></div>
      <div class="stat-box green"><div class="stat-val">${avg}</div><div class="stat-lbl">Средняя оценка</div></div>
    </div>
    ${unpaid>0?`<div class="card" style="border-color:#fbbf24;background:#fffbeb"><div style="font-weight:700;color:#92400e">⚠️ Неоплачено уроков: ${unpaid}</div></div>`:''}
    <div class="card"><div class="card-label">Уровни знания слов</div>
      ${['Новые','Учат','Почти','Знают'].map((l,i)=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="ldot lv${i}"></div>
          <div style="font-size:13px;font-weight:600;min-width:70px">${l}</div>
          <div class="pbar-wrap" style="flex:1"><div class="pbar" style="width:${Math.round(lvls[i]/tot*100)}%;background:${['#cbd5e1','#f87171','#fb923c','#4ade80'][i]}"></div></div>
          <div style="font-size:13px;color:var(--text2);font-weight:700">${lvls[i]}</div>
        </div>`).join('')}
    </div>
    <div class="card"><div class="card-label">По темам</div>
      ${Object.entries(tmap).map(([t,v])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="font-size:13px;font-weight:600;min-width:90px">${t}</div>
          <div class="pbar-wrap" style="flex:1"><div class="pbar" style="width:${Math.round(v.k/v.t*100)}%"></div></div>
          <div style="font-size:12px;color:var(--text2);font-weight:700">${v.k}/${v.t}</div>
        </div>`).join('')||'<p style="font-size:14px;color:var(--text2)">Нет данных</p>'}
    </div>
  </div>`;
}

function addFab(fn) {
  const old = document.getElementById('fab');
  if (old) old.remove();
  const btn = document.createElement('button');
  btn.className = 'fab'; btn.id = 'fab';
  btn.innerHTML = `<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`;
  btn.onclick = fn;
  document.body.appendChild(btn);
}

async function openLesson(id) {
  const { data: l } = await sb.from('lessons').select('*').eq('id',id).single();

async function saveLesson() {
  const title = document.getElementById('li-title').value.trim();
  const date = document.getElementById('li-date').value;
  if (!title||!date) { toast('Заполни название и дату'); return; }
  const payload = {
    title, date, teacher_id: me.id,
    zoom_link: document.getElementById('li-zoom').value.trim()||null,
    homework: document.getElementById('li-hw').value.trim()||null,
    notes: document.getElementById('li-notes').value.trim()||null,
    grade: document.getElementById('li-grade').value ? parseInt(document.getElementById('li-grade').value) : null
  };
  let error;
  if (editLessonId) {
    ({error} = await sb.from('lessons').update(payload).eq('id',editLessonId));
  } else {
    ({error} = await sb.from('lessons').insert({...payload, status:'planned'}));
  }
  if (error) { toast('Ошибка: '+error.message); return; }
  closeModal('m-lesson');
  toast('Урок сохранён ✓');
  tScreen('lessons', 2);
}

async function deleteLesson() {
  if (!editLessonId) return;
  const {error} = await sb.from('lessons').delete().eq('id',editLessonId);
  if (error) { toast('Ошибка: '+error.message); return; }
  closeModal('m-lesson');
  toast('Урок удалён');
  tScreen('lessons', 2);
}

function togglePaid(btn) {
  if (!btn.dataset.lessonId) return;
  const paid = btn.dataset.paid === '0';
  sb.from('lessons').update({paid}).eq('id',btn.dataset.lessonId).then(({error}) => {
    if (error) { toast('Ошибка'); return; }
    btn.dataset.paid = paid?'1':'0';
    btn.classList.toggle('on', paid);
    toast(paid?'Отмечен как оплаченный ✓':'Отметка снята');
  });
}

async function toggleStatus(btn) {
  if (btn.dataset.status==='done') return;
  if (!btn.dataset.lid) { toast('Сначала сохрани урок'); return; }
  btn.disabled = true;
  const newStatus = btn.dataset.status==='planned' ? 'active' : 'done';
  const update = {status: newStatus};
  if (newStatus==='active') update.started_at = new Date().toISOString();
  if (newStatus==='done') update.ended_at = new Date().toISOString();
  const {error} = await sb.from('lessons').update(update).eq('id',btn.dataset.lid);
  btn.disabled = false;
  if (error) { toast('Ошибка: '+error.message); return; }
  btn.textContent = newStatus==='active'?'🔴 Урок идёт — завершить':'✓ Урок завершён';
  btn.dataset.status = newStatus;
  toast(newStatus==='active'?'🔴 Урок начат!':'✓ Урок завершён!');
}

    .neq('id', editStudentId||'00000000-0000-0000-0000-000000000000');

  const payload = { name, pin, subject: document.getElementById('si-subject').value.trim()||'Английский', teacher_id: me.id };

async function openChat(lessonId, lessonTitle) {
  chatLessonId = lessonId;
  document.getElementById('m-chat-title').textContent = '💬 ' + lessonTitle;
  document.getElementById('chat-messages').innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">Загрузка...</div>';
  openModal('m-chat');
  await loadMessages();
  // Realtime подписка
  if (chatChannel) chatChannel.unsubscribe();
  chatChannel = sb.channel('chat-'+lessonId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages',filter:`lesson_id=eq.${lessonId}`},
      () => loadMessages())
    .subscribe();
}

async function loadMessages() {
  const {data}=await sb.from('messages').select('*').eq('lesson_id',chatLessonId).order('created_at');
  const wrap=document.getElementById('chat-messages');
  if (!wrap) return;
  if (!data?.length) { wrap.innerHTML='<div class="empty"><div class="empty-icon">💬</div><p>Напишите первое сообщение!</p></div>'; return; }
  wrap.innerHTML=data.map(m=>{
    const mine = m.sender_id===me.id;
    return `<div class="msg ${mine?'mine':'theirs'}">
      ${!mine?`<div class="msg-who">${m.sender_role==='teacher'?'Учитель':m.sender_role==='parent'?'Родитель':'Вадим'}</div>`:''}
      <div class="msg-bubble">${m.text}</div>
      <div class="msg-time">${fmtTime(m.created_at)}</div>
    </div>`;
  }).join('');
  wrap.scrollTop=wrap.scrollHeight;
}

async function sendMsg() {
  const input=document.getElementById('chat-input');
  const text=input.value.trim();
  if (!text||!chatLessonId) return;
  input.value='';
  const {error}=await sb.from('messages').insert({
    lesson_id:chatLessonId, sender_id:me.id, sender_role:me.role, text
  });
  if (error) toast('Ошибка: '+error.message);
}

let reviewQ=[], reviewIdx=0, cardFlipped=false;
async function sCards(el) {
  const {data}=await sb.from('words').select('*');
  const now=new Date();
  reviewQ=(data||[]).filter(w=>w.level<3||new Date(w.next_review)<=now);
  if (!reviewQ.length) reviewQ=data||[];
  reviewQ=reviewQ.sort(()=>Math.random()-.5).slice(0,20);
  reviewIdx=0;
  el.innerHTML=`<div class="page"><div class="sec-title">Карточки</div><div id="cards-area"></div></div>`;
  renderCard();
}

function renderCard() {
  const area=document.getElementById('cards-area');
  if (!area) return;
  if (!reviewQ.length) { area.innerHTML='<div class="empty"><div class="empty-icon">📖</div><p>Слов пока нет</p></div>'; return; }
  if (reviewIdx>=reviewQ.length) {
    area.innerHTML=`<div class="empty"><div class="empty-icon">🏆</div><p>Все карточки пройдены!<br>Молодец, ${me.name}!</p><br><button class="btn btn-primary" style="max-width:200px;margin:0 auto" onclick="sScreen('cards',2)">Ещё раз</button></div>`;
    return;
  }
  const w=reviewQ[reviewIdx];
  const dots=reviewQ.slice(0,Math.min(10,reviewQ.length)).map((_,i)=>
    `<div style="width:8px;height:8px;border-radius:50%;background:${i<reviewIdx?'var(--green)':i===reviewIdx?'var(--accent)':'var(--border)'}"></div>`
  ).join('');
  cardFlipped=false;
  area.innerHTML=`
    <div style="display:flex;gap:5px;align-items:center;justify-content:center;margin-bottom:14px">${dots}<span style="font-size:13px;color:var(--text2);font-weight:600;margin-left:4px">${reviewIdx+1}/${reviewQ.length}</span></div>
    <div class="fc-wrap"><div class="fc" id="fc" onclick="flipCard()">
      <div class="fc-face fc-front">
        <div class="fc-chip">${w.topic||'—'}</div>
        <div class="fc-word">${w.word}</div>
        <div class="fc-hint">Нажми — увидишь перевод</div>
      </div>
      <div class="fc-face fc-back">
        <div class="fc-word" style="color:var(--accent)">${w.translation}</div>
        <div class="fc-hint">${w.word}</div>
      </div>
    </div></div>
    <div id="fc-btns" style="display:none;margin-top:12px;display:none">
      <div style="display:flex;gap:10px">
        <button style="flex:1;padding:13px;border-radius:var(--rs);border:1.5px solid #fecaca;background:var(--rl);color:var(--red);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer" onclick="markCard(false)">Не знаю 😕</button>
        <button style="flex:1;padding:13px;border-radius:var(--rs);border:1.5px solid #bbf7d0;background:var(--gl);color:var(--green);font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;cursor:pointer" onclick="markCard(true)">Знаю! ✓</button>
      </div>
    </div>
    <p style="text-align:center;color:var(--text3);font-size:12px;margin-top:14px;font-weight:600">Нажми на карточку</p>`;
}

function flipCard() {
  const fc=document.getElementById('fc'); if (!fc) return;
  cardFlipped=!cardFlipped; fc.classList.toggle('flipped',cardFlipped);
  document.getElementById('fc-btns').style.display=cardFlipped?'block':'none';
}

async function markCard(knew) {
  const w=reviewQ[reviewIdx];
  const nLv=knew?Math.min(3,w.level+1):Math.max(0,w.level-1);
  const d=new Date(); d.setDate(d.getDate()+([1,3,7,14][nLv]||14));
  await sb.from('words').update({level:nLv,next_review:d.toISOString()}).eq('id',w.id);
  reviewIdx++; renderCard();
}

async function sWordsList(el) {
  const {data}=await sb.from('words').select('*').order('level',{ascending:false});
  el.innerHTML=`<div class="page"><div class="sec-title">Мои слова</div><div class="sec-sub">${data?.length||0} слов в словаре</div><div id="s-words"></div><div style="height:80px"></div></div>`;
  const list=document.getElementById('s-words');
  if (!data?.length) { list.innerHTML='<div class="empty"><div class="empty-icon">📖</div><p>Слов пока нет</p></div>'; return; }
  list.innerHTML=data.map(w=>`
    <div class="witem">
      <div class="ldot lv${w.level}"></div>
      <div><div class="wen">${w.word}</div><div class="wru">${w.translation}</div></div>
      <div class="wchip">${w.topic||'—'}</div>
    </div>`).join('');
}

// ════════════════════════════════════════
//  ──── PARENT ────
// ════════════════════════════════════════
function buildParent() {
  setNav([
    { fn:"pScreen('home',0)", icon:`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12L12 3L21 12M5 10V20H9V15H15V20H19V10"/></svg>`, label:'Главная' },
    { fn:"pScreen('lessons',1)", icon:`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>`, label:'Уроки' },
    { fn:"pScreen('progress',2)", icon:`<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 20h18M7 20V10M11 20V4M15 20V14M19 20V8"/></svg>`, label:'Прогресс' }
  ]);
  pScreen('home', 0);
}

function pScreen(name, idx) {
  setActiveNav(idx);
  const content=document.getElementById('app-content');
  if (name==='home') pHome(content);
  else if (name==='lessons') pLessons(content);
  else if (name==='progress') pProgress(content);
}

async function pHome(el) {
  const [{data:lessons},{data:words}]=await Promise.all([
    sb.from('lessons').select('*').order('date',{ascending:false}),
    sb.from('words').select('level')
  ]);
  const known=(words||[]).filter(w=>w.level===3).length;
  const grades=(lessons||[]).filter(l=>l.grade).map(l=>l.grade);
  const avg=grades.length?(grades.reduce((a,b)=>a+b,0)/grades.length).toFixed(1):'—';
  const unpaid=(lessons||[]).filter(l=>!l.paid).length;
  const last=lessons?.[0];
  el.innerHTML=`<div class="page">
    <div class="sec-title">Прогресс ученика 📊</div>
    <div class="sec-sub">Обзор обучения</div>
    <div class="stat-row">
      <div class="stat-box blue"><div class="stat-val">${lessons?.length||0}</div><div class="stat-lbl">Уроков</div></div>
      <div class="stat-box green"><div class="stat-val">${avg}</div><div class="stat-lbl">Средняя оценка</div></div>
      <div class="stat-box orange"><div class="stat-val">${words?.length||0}</div><div class="stat-lbl">Слов</div></div>
      <div class="stat-box blue"><div class="stat-val">${known}</div><div class="stat-lbl">Знает хорошо</div></div>
    </div>
    ${unpaid>0?`<div class="card" style="border-color:#fbbf24;background:#fffbeb"><div style="font-weight:700;color:#92400e">⚠️ Не оплачено уроков: ${unpaid}</div></div>`:''}
    ${last?.homework?`<div class="card" style="border-color:#fb923c;background:#fff7ed">
      <div class="card-label">📝 Текущее ДЗ</div>
      <div style="font-weight:600;font-size:15px">${last.homework}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:6px">${fmtDate(last.date)}</div>
    </div>`:''}
  </div>`;
}

async function pLessons(el) {
  const {data}=await sb.from('lessons').select('*').order('date',{ascending:false});
  el.innerHTML=`<div class="page"><div class="sec-title">История уроков</div><div class="sec-sub">Все занятия</div><div id="p-lessons"></div><div style="height:80px"></div></div>`;
  const list=document.getElementById('p-lessons');
  if (!data?.length) { list.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p>Уроков пока нет</p></div>'; return; }
  list.innerHTML=data.map(l=>`
    <div class="lcard">
      <div class="lcard-top">
        <div><div class="lcard-title">${l.title}</div><div class="lcard-meta">${fmtDate(l.date)}</div></div>
        ${l.grade?`<div class="grade grade-${l.grade}">${l.grade}</div>`:'<span class="badge badge-gray">Запланирован</span>'}
      </div>
      <div class="lcard-footer">
        ${l.paid?'<span class="badge badge-green">✓ Оплачен</span>':'<span class="badge badge-gray">Не оплачен</span>'}
        ${l.homework?'<span class="badge badge-orange">📝 ДЗ</span>':''}
      </div>
      ${l.homework?`<div style="margin-top:8px;font-size:13px;color:var(--text2)">${l.homework}</div>`:''}
      <div class="lcard-footer" style="margin-top:8px">
        <button class="badge badge-gray" style="cursor:pointer;border:none" onclick="openChat('${l.id}','${l.title.replace(/'/g,"\\'")}')">💬 Написать учителю</button>
      </div>
    </div>`).join('');
}

async function pProgress(el) {
  const {data:words}=await sb.from('words').select('level,topic');
  const lvls=[0,0,0,0]; const tmap={};
  (words||[]).forEach(w=>{
    lvls[w.level]++;
    if (!tmap[w.topic]) tmap[w.topic]={t:0,k:0};
    tmap[w.topic].t++; if(w.level===3) tmap[w.topic].k++;
  });
  const tot=words?.length||1;
  el.innerHTML=`<div class="page"><div class="sec-title">Прогресс по словам</div><div class="sec-sub">Детальная статистика</div>
    <div class="card"><div class="card-label">Уровни знания</div>
      ${['Новые','Учит','Почти знает','Знает'].map((l,i)=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div class="ldot lv${i}"></div>
          <div style="font-size:13px;font-weight:600;min-width:100px">${l}</div>
          <div class="pbar-wrap" style="flex:1"><div class="pbar" style="width:${Math.round(lvls[i]/tot*100)}%;background:${['#cbd5e1','#f87171','#fb923c','#4ade80'][i]}"></div></div>
          <div style="font-size:13px;color:var(--text2);font-weight:700">${lvls[i]}</div>
        </div>`).join('')}
    </div>
    <div class="card"><div class="card-label">По темам</div>
      ${Object.entries(tmap).map(([t,v])=>`
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <div style="font-size:13px;font-weight:600;min-width:90px">${t}</div>
          <div class="pbar-wrap" style="flex:1"><div class="pbar" style="width:${Math.round(v.k/v.t*100)}%"></div></div>
          <div style="font-size:12px;color:var(--text2);font-weight:700">${v.k}/${v.t}</div>
        </div>`).join('')||'<p style="font-size:14px;color:var(--text2)">Нет данных</p>'}
    </div>
  </div>`;
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
}
</script>
</body>
